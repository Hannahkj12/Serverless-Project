name: Deploy Infrastructure and Site
on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Zip Lambda Function
        run: zip -j lambda_function.zip lambda/lambda_function.py

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Inject API URL into index.html
        run: |
          API_URL=$(terraform output -raw api_url)
          sed -i "s|REPLACE_WITH_API_URL|$API_URL|g" index.html

      - name: Seed DynamoDB Table
        env:
          AWS_DEFAULT_REGION: us-east-1
        run: |
          pip install boto3
          python seed_data.py

      - name: Sync Frontend & Images to S3
        run: |
          aws s3 sync . s3://pdc-donut-sticker-bucket --exclude "*" --include "index.html" --include "images/*"
